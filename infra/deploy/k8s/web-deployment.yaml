apiVersion: apps/v1
kind: Deployment
metadata:
  name: cominsula-web
  labels:
    app: cominsula-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cominsula-web
  template:
    metadata:
      labels:
        app: cominsula-web
    spec:
      containers:
        - name: web
          image: cominsula/web:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cominsula-web
spec:
  type: LoadBalancer
  selector:
    app: cominsula-web
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cominsula-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cominsula-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
